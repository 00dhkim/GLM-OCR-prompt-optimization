services:
  vllm:
    build:
      context: .
      dockerfile: Dockerfile.vllm
    image: glm-ocr-vllm:local
    container_name: glm-ocr-vllm
    restart: "no"
    runtime: nvidia
    shm_size: 8g
    ports:
      - "8000:8000"
    environment:
      HF_TOKEN: "${HF_TOKEN:-}"
      HUGGING_FACE_HUB_TOKEN: "${HF_TOKEN:-}"
      NVIDIA_VISIBLE_DEVICES: "all"
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      VLLM_LOGGING_LEVEL: "INFO"
    volumes:
      - "./.cache/huggingface:/root/.cache/huggingface"
    command:
      - zai-org/GLM-OCR
      - --served-model-name
      - GLM-OCR
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --trust-remote-code
      - --dtype
      - half
      - --gpu-memory-utilization
      - "0.75"
      - --max-model-len
      - "1024"
      - --tensor-parallel-size
      - "1"
      - --enforce-eager
      - --allowed-local-media-path
      - /
      - --limit-mm-per-prompt
      - '{"image":1}'
      - --skip-mm-profiling
